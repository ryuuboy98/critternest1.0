name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npx cap add ios
          npx cap sync ios

      - name: Build Xcode Project (Unsigned Simulator App)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     clean build

      - name: Packaging App into IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphonesimulator/App.app Payload/
          zip -r app-simulator.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-ipa
          path: app-simulator.ipa
